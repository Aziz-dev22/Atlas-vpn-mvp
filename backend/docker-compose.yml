version: "3.9"

services:

  backend:
    build: ./backend
    container_name: atlas_backend
    restart: always

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: atlas_postgres
    restart: always

    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas123
      POSTGRES_DB: atlasvpn

    volumes:
      - pg_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: atlas_redis
    restart: always

    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: atlas_nginx
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

volumes:
  pg_data:
