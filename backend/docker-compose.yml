version: "3.9"

services:

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    restart: always

    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas123
      POSTGRES_DB: atlasvpn

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"
